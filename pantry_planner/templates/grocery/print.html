<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Printable Grocery List</title>
  <style>
    :root { --line: #dadada; --ink: #333; --muted: #555; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f3f3f3; color: var(--ink); font-family: Georgia, 'Times New Roman', serif; }
    .print-sheet {
      width: min(8.5in, calc(100vw - 32px));
      margin: 20px auto;
      background: #fff;
      border: 1px solid #ddd;
      padding: 42px 44px 32px;
    }
    h1 { font-size: 3rem; margin: 0 0 0.35rem; line-height: 1.05; }
    .printed-at { font-family: Arial, Helvetica, sans-serif; font-size: 2rem; color: #444; margin-bottom: 18px; }
    table { width: 100%; border-collapse: collapse; font-family: Arial, Helvetica, sans-serif; }
    thead th { text-align: left; font-size: 2rem; padding: 9px 6px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
    tbody td { padding: 10px 6px; font-size: 2rem; border-bottom: 1px solid var(--line); vertical-align: middle; }
    .col-check { width: 36px; }
    .box { display: inline-block; width: 22px; height: 22px; border: 2px solid #999; border-radius: 2px; }
    .qty-pill { display: inline-block; border: 1px solid #cfcfcf; border-radius: 8px; padding: 2px 8px; }
    .summary-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 16px; font-family: Arial, Helvetica, sans-serif; font-size: 2rem; }

    @media print {
      @page { size: letter; margin: 0.45in; }
      body { background: #fff; }
      .print-sheet { width: auto; margin: 0; border: none; padding: 0; }
    }
  </style>
</head>
<body>
  <main class="print-sheet">
    <h1>Grocery List</h1>
    <div class="printed-at">Printed: {{ printed_at }}</div>

    <table>
      <thead>
        <tr>
          <th class="col-check"><span class="box" aria-hidden="true"></span></th>
          <th>Item</th>
          <th>Qty</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
          <tr>
            <td class="col-check"><span class="box" aria-hidden="true"></span></td>
            <td>{{ item.item_name }}</td>
            <td>{% if item.quantity %}<span class="qty-pill">{{ item.quantity }}</span>{% endif %}</td>
            <td>{{ item.notes or '' }}</td>
          </tr>
        {% endfor %}

        {% for _ in range([12 - items|length, 0]|max) %}
          <tr>
            <td class="col-check"><span class="box" aria-hidden="true"></span></td>
            <td>&nbsp;</td>
            <td></td>
            <td></td>
          </tr>
        {% endfor %}
      </tbody>
    </table>

    <div class="summary-row">
      <span>Total items: {{ total_count }}</span>
      <span>1/1</span>
    </div>
  </main>

  <script>window.print();</script>
</body>
</html>
